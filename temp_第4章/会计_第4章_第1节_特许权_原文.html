<h4 id="五特许权">（五）特许权</h4>
<p>特许权，又称经营特许权、专营权，指企业在某一地区经营或销售某种特定商品的权利或是一家企业接受另一家企业使用其商标、商号、技术秘密等的权利。通常有</p>
<p>两种形式：一种是由政府机构授权，准许企业使用或在一定地区享有经营某种业务的特权，如水、电、邮电通信等专营权、烟草专卖权等；另一种指企业间依照签订的合同，有限期或无限期使用另一家企业的某些权利，如连锁店分店使用总店的名称等。另外，企业的某些特殊业务也会产生特许权，如社会资本方的政府和社会资本合作（PPP）项目合同符合无形资产模式的应当确认为无形资产，具体见本书第十七章收入的相关内容。</p>
