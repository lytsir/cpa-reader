id="会计-第13章-第6节-指定条件" class="section-anchor"></div><h4 id="一指定条件">（一）指定条件</h4>
<p>企业使用以公允价值计量且其变动计入当期损益的信用衍生工具管理金融工具（或其组成部分）的信用风险敞口时，可以在该金融工具（或其组成部分）初始确认时、后续计量中或尚未确认时，将其指定为以公允价值计量且其变动计入当期损益的金融工具，并同时作出书面记录，但应当同时满足下列条件：</p>
<p>（1）金融工具信用风险敞口的主体（如借款人或贷款承诺持有人）与信用衍生工具涉及的主体相一致；</p>
<p>（2）金融工具的偿付级次与根据信用衍生工具条款须交付的工具的偿付级次相一致。</p>
