* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f8f9fa; color: #333; line-height: 1.8; }
header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 80px 20px; text-align: center; }

.subject-icon { font-size: 3rem; margin-bottom: 15px; }
.subject-name { font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; }
.subject-count { color: #666; font-size: 1rem; }
.subject-btn { display: inline-block; margin-top: 20px; padding: 12px 35px; border-radius: 25px; color: white; font-weight: 500; text-decoration: none; }
.total-bar { text-align: center; margin-top: 50px; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.total-bar h2 { font-size: 1.5rem; color: #444; }
.total-bar .number { font-size: 2.5rem; font-weight: 700; color: #667eea; margin: 10px 0; }
