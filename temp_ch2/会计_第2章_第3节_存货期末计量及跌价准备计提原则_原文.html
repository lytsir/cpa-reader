<h3 id="一存货期末计量及存货跌价准备计提原则">一、存货期末计量及存货跌价准备计提原则</h3>
<p>资产负债表日，存货应当按照成本与可变现净值孰低计量。</p>
<p>当存货成本低于可变现净值时，存货按成本计量；当存货成本高于可变现净值时，存货按可变现净值计量，同时按照成本高于可变现净值的差额计提存货跌价准备，计入当期损益。</p>
<p>成本与可变现净值孰低计量的理论基础主要是使存货符合资产的定义，且符合谨慎性的质量要求。当存货的可变现净值下跌至成本以下时，表明该存货为企业带来的未来经济利益低于其账面成本，因而应将这部分损失从资产价值中扣除，计入当期损益。否则，存货的可变现净值低于成本时，如果仍然以其成本计量，就会出现虚计资产的现象。</p>
