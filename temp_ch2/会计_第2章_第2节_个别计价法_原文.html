<h4 id="四个别计价法">（四）个别计价法</h4>
<p>个别计价法，亦称个别认定法、具体辨认法、分批实际法，其特征是注重所发出存货具体项目的实物流转与成本流转之间的联系，逐一辨认各批发出存货和期末存货所属的购进批别或生产批别，分别按其购入或生产时所确定的单位成本计算各批发出存货和期末存货的成本。即把每一种存货的实际成本作为计算发出存货成本和期末存货成本的基础。对于不能替代使用的存货、为特定项目专门购入或制造的存货以及提供的劳务，通常采用个别计价法确定发出存货的成本，如珠宝、名画等贵重物品。在实际工作中，越来越多的企业采用计算机信息系统进行会计处理，个别计价法可以广泛应用于发出存货的计价，并且个别计价法确定的存货成本最为准确。</p>
