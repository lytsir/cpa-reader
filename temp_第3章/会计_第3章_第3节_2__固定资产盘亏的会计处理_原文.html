<h4 id="固定资产盘亏的会计处理">2. 固定资产盘亏的会计处理</h4>
<p>固定资产盘亏造成的损失，应当计入当期损益。企业在财产清查中盘亏的固定资产，按盘亏固定资产的账面价值，借记“待处理财产损溢——待处理固定资产损溢”科目，按已计提的累计折旧，借记“累计折旧”科目，按已计提的减值准备，借记“固定资产减值准备”科目，按固定资产原价，贷记“固定资产”科目。按管理权限报经批准后处理时，按可收回的保险赔偿或过失人赔偿，借记“其他应收款”科目，按应计入营业外支出的金额，借记“营业外支出——盘亏损失”科目，贷记“待处理财产损溢”科目。</p>
