<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CPA大白话</title>
  <link rel="stylesheet" href="style.css?v=27">
</head>
<body>
  <div id="app">
    <!-- 顶部栏 -->
    <header class="top-bar">
      <div class="left-controls">
        <button id="menu-toggle" class="icon-btn" aria-label="目录">☰</button>
        <select id="subject-select">
          <option value="会计">会计</option>
          <option value="审计">审计</option>
          <option value="财管">财务成本管理</option>
          <option value="战略">公司战略与风险管理</option>
          <option value="经济法">经济法</option>
          <option value="税法">税法</option>
        </select>
      </div>
      <div class="right-controls">
        <button id="translate-toggle" class="icon-btn" aria-label="大白话">💬</button>
        <h1 class="app-title desktop-only">CPA大白话</h1>
      </div>
    </header>

    <!-- 主体三栏 -->
    <div class="main-container">
      <!-- 左栏：目录 -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <h2>目录</h2>
          <button id="pin-toggle" class="icon-btn" aria-label="固定">📌</button>
        </div>
        <div id="toc-tree" class="toc-tree"></div>
      </aside>

      <!-- 遮罩层（手机端） -->
      <div id="sidebar-overlay" class="sidebar-overlay"></div>

      <!-- 中栏：原文 -->
      <section id="original-panel" class="original-panel">
        <div id="original-content" class="original-content"></div>
      </section>

      <!-- 分隔线 -->
      <div id="resizer" class="resizer"></div>

      <!-- 右栏：大白话 -->
      <section id="translate-panel" class="translate-panel">
        <div class="panel-header">
          <span>大白话解读</span>
          <button id="translate-close" class="icon-btn mobile-only" aria-label="关闭">✕</button>
        </div>
        <div id="translate-content" class="translate-content">
          <div class="placeholder">加载中...</div>
        </div>
      </section>
    </div>
  </div>

  <script src="app.js?v=27"></script>
</body>
</html>
