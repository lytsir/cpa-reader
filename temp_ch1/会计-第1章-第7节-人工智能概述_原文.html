id="会计-第1章-第7节-人工智能概述" class="section-anchor"></div><h3 id="一人工智能概述">一、人工智能概述</h3>
<p>人工智能是计算机科学的核心分支，旨在通过一系列广泛的计算机程序，让计算机模拟人类的智能行为，如语言识别、图像识别、从经验中学习以及制定决策等。</p>
<p>人工智能通过机器学习、专家系统、自动化决策、自然语言处理、计算机视觉和情感计算等技术，使计算机具备感知、学习和自适应能力。例如，计算机视觉技术使计算机能够解析和理解视觉世界中的数字图像、视频及其他视觉输入，光学字符识别技术可以用来扫描PDF文档，并将其转换为数字化的文本格式。</p>
