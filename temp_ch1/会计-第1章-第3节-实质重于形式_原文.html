id="会计-第1章-第3节-实质重于形式" class="section-anchor"></div><h3 id="五实质重于形式">五、实质重于形式</h3>
<p>实质重于形式要求企业应当按照交易或者事项的经济实质进行会计确认、计量和报</p>
<p>告，而不仅仅以交易或者事项的法律形式为依据。</p>
<p>企业发生的交易或事项在多数情况下，其经济实质和法律形式是一致的。但在某些特定情况下，会出现不一致。例如，商品已经售出，但企业为确保到期收回债款而暂时保留商品的法定所有权时，该权利通常不会对客户取得对该商品的控制权构成障碍，在满足收入确认的其他条件时，企业确认相应的收入。</p>
